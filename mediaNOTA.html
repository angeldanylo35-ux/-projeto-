<body>

<button onclick="verificarMedia()">Verificar mĂŠdia</button>

<script>
function verificarMedia() {
  let media = Number(prompt("Digite a mĂŠdia do aluno:"));

  if (media >= 6) {
    alert(`Aprovado`);
  } else if (media >= 2 && media < 6) {
    alert(`Prova de recuperaĂ§ĂŁo`);
  } else {
    alert(`Reprovado`);
  }
}
</script>
